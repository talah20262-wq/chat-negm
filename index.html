<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>AI Chat App</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding-top: 40px;
    }

    input {
      width: 250px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #00c3ff;
      cursor: pointer;
      font-weight: bold;
    }

    .box {
      margin-top: 20px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      min-height: 100px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🤖 AI Chat Website</h1>

<input id="input" placeholder="اكتب سؤالك..." />
<button onclick="send()">إرسال</button>

<div class="box" id="output">الرد هيظهر هنا...</div>

<script>
async function send() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");

  output.innerHTML = "جاري التحميل...";

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",

      // 🔴 هنا تحط API KEY بتاعك
      "Authorization": "Bearer PUT_YOUR_API_KEY_HERE"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        { role: "user", content: text }
      ]
    })
  });

  const data = await response.json();

  output.innerHTML =
    data?.choices?.[0]?.message?.content || "حصل خطأ في الرد";
}
</script>

</body>
</html>
